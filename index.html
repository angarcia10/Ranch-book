function filterByStatus(status){
  activeFilters={status:status,sort:'tag'};
  typeFilt='all';
  document.querySelectorAll('.tab-btn').forEach(function(t){t.classList.remove('on');});
  document.querySelector('.tab-btn').classList.add('on');
  document.getElementById('ffStatus').value=status;
  updateFilterBar();
  goList();
  showFilterToast('Showing status: '+status);
}

function filterByPreg(preg){
  if(preg==='unknown')return; // unknown not filterable meaningfully
  activeFilters={preg:preg,sort:'tag'};
  typeFilt='cow';
  document.querySelectorAll('.tab-btn').forEach(function(t,i){t.classList.remove('on');if(i===1)t.classList.add('on');});
  document.getElementById('ffPreg').value=preg;
  updateFilterBar();
  goList();
  showFilterToast('Showing cows: '+preg);
}

function filterByAge(bucket){
  // Filter calves list — we set typeFilt to calf and use DOB range
  activeFilters={sort:'dob'};
  typeFilt='calf';
  var now=new Date();
  var from='',to='';
  if(bucket==='< 3 mo'){
    from=dateMinus(now,90); to=dateStr(now);
  } else if(bucket==='3–6 mo'){
    from=dateMinus(now,180); to=dateMinus(now,90);
  } else if(bucket==='6–12 mo'){
    from=dateMinus(now,365); to=dateMinus(now,180);
  } else if(bucket==='1–2 yr'){
    from=dateMinus(now,730); to=dateMinus(now,365);
  } else if(bucket==='2+ yr'){
    from=''; to=dateMinus(now,730);
    activeFilters.dobTo=to;
  }
  if(from){activeFilters.dobFrom=from; document.getElementById('ffDobFrom').value=from;}
  if(to&&bucket!=='2+ yr'){activeFilters.dobTo=to; document.getElementById('ffDobTo').value=to;}
  document.querySelectorAll('.tab-btn').forEach(function(t,i){t.classList.remove('on');if(i===3)t.classList.add('on');});
  updateFilterBar();
  goList();
  showFilterToast('Calves aged: '+bucket);
}

function filterByYear(year){
  activeFilters={dobFrom:year+'-01-01',dobTo:year+'-12-31',sort:'dob'};
  typeFilt='all';
  document.querySelectorAll('.tab-btn').forEach(function(t){t.classList.remove('on');});
  document.querySelector('.tab-btn').classList.add('on');
  document.getElementById('ffDobFrom').value=year+'-01-01';
  document.getElementById('ffDobTo').value=year+'-12-31';
  updateFilterBar();
  goList();
  showFilterToast('Born in: '+year);
}

function dateStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dateMinus(d,days){
  var nd=new Date(d.getTime()-days*86400000);
  return dateStr(nd);
}

// Toast notification shown when filter is applied from reports
function showTip(e,html){
  var t=document.getElementById('chartTip');
  t.innerHTML=html;t.style.display='block';
  moveTip(e);
}
function moveTip(e){
  var t=document.getElementById('chartTip');
  var x=(e.touches?e.touches[0].clientX:e.clientX);
  var y=(e.touches?e.touches[0].clientY:e.clientY);
  var tw=t.offsetWidth,th=t.offsetHeight;
  var left=x+14; if(left+tw>window.innerWidth-8)left=x-tw-14;
  var top=y-th/2; if(top<8)top=8; if(top+th>window.innerHeight-8)top=window.innerHeight-th-8;
  t.style.left=left+'px';t.style.top=top+'px';
}
function hideTip(){document.getElementById('chartTip').style.display='none';}

// Attach tooltip listeners to SVG paths after render
function attachDonutTips(svgEl){
  if(!svgEl)return;
  svgEl.querySelectorAll('path[data-tip]').forEach(function(p){
    p.addEventListener('mouseenter',function(e){showTip(e,p.getAttribute('data-tip'));});
    p.addEventListener('mousemove',moveTip);
    p.addEventListener('mouseleave',hideTip);
    p.addEventListener('touchstart',function(e){showTip(e,p.getAttribute('data-tip'));e.stopPropagation();});
    p.addEventListener('touchend',function(){setTimeout(hideTip,1200);});
  });
}

function showFilterToast(msg){
  var existing=document.getElementById('filterToast');
  if(existing)existing.remove();
  var t=document.createElement('div');
  t.id='filterToast';
  t.textContent=msg+' — tap Filter & Sort to clear';
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2C1A0E;color:#F5ECD7;padding:10px 18px;border-radius:20px;font-size:0.78rem;font-family:Georgia,serif;z-index:500;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.3);';
  document.body.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.remove();},3000);
}

function exportSection(key){
  var now=new Date();
  var dateStr=now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
  var rows=[];
  var filename='RanchBook_'+key+'_'+dateStr+'.csv';

  function csv(v){
    if(v===null||v===undefined)return '';
    var s=String(v);
    if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)return '"'+s.replace(/"/g,'""')+'"';
    return s;
  }
  function row(arr){return arr.map(csv).join(',');}

  var cows=A.filter(function(a){return a.type==='cow';});
  var bulls=A.filter(function(a){return a.type==='bull';});
  var calves=A.filter(function(a){return a.type==='calf';});
  var nowMs=now.getTime();

  if(key==='overview'){
    filename='RanchBook_HerdOverview_'+dateStr+'.csv';
    rows.push(row(['Category','Count']));
    rows.push(row(['Total Animals',A.length]));
    rows.push(row(['Cows',cows.length]));
    rows.push(row(['Bulls',bulls.length]));
    rows.push(row(['Calves',calves.length]));
    rows.push(row(['Heifers (female calves)',calves.filter(function(c){return c.sex==='heifer';}).length]));
    rows.push(row(['Bull Calves',calves.filter(function(c){return c.sex==='bull-calf';}).length]));
    rows.push(row(['Steers',calves.filter(function(c){return c.sex==='steer';}).length]));
  }

  else if(key==='pregnancy'){
    filename='RanchBook_PregnancyStatus_'+dateStr+'.csv';
    rows.push(row(['Tag #','Breed','Status','Expected Calving','Days Away']));
    cows.forEach(function(c){
      var diff='';
      if(c.pregnancyStatus==='pregnant'&&c.expectedCalving){
        var d=Math.round((new Date(c.expectedCalving+'T00:00:00').getTime()-nowMs)/86400000);
        diff=d<0?Math.abs(d)+' overdue':d===0?'Today':d+' days';
      }
      rows.push(row([c.tag||'',c.breed||'',c.pregnancyStatus||'unknown',c.expectedCalving||'',diff]));
    });
  }

  else if(key==='calvings'){
    filename='RanchBook_UpcomingCalvings_'+dateStr+'.csv';
    rows.push(row(['Tag #','Breed','Expected Calving Date','Days Away']));
    cows.filter(function(c){return c.pregnancyStatus==='pregnant'&&c.expectedCalving;})
      .sort(function(a,b){return a.expectedCalving.localeCompare(b.expectedCalving);})
      .forEach(function(c){
        var diff=Math.round((new Date(c.expectedCalving+'T00:00:00').getTime()-nowMs)/86400000);
        var label=diff<0?Math.abs(diff)+' days overdue':diff===0?'Today':diff+' days';
        rows.push(row([c.tag||'',c.breed||'',c.expectedCalving,label]));
      });
  }

  else if(key==='calves_age'){
    filename='RanchBook_CalvesByAge_'+dateStr+'.csv';
    rows.push(row(['Tag #','Breed / Cross','Sex','Date of Birth','Age','Weight (lbs)','Status']));
    calves.sort(function(a,b){
      if(!a.dob&&!b.dob)return 0; if(!a.dob)return 1; if(!b.dob)return -1;
      return a.dob.localeCompare(b.dob);
    }).forEach(function(c){
      var ag=calcAge(c.dob)||c.age||'';
      var br=resolveCalfBreed(c).short||c.breed||'';
      rows.push(row([c.tag||'',br,c.sex||'',c.dob||'',ag,c.weight||'',c.status||'']));
    });
  }

  else if(key==='buyer'){
    filename='RanchBook_CalfBuyerSummary_'+dateStr+'.csv';
    rows.push('CALF BUYER SUMMARY — Generated: '+dateStr);
    rows.push('');
    rows.push(row(['Tag #','Sex','Breed / Cross','Sire Breed','Dam Tag','Dam Breed','Calving Date','Age','Weight (lbs)','BCS','Color','Status']));
    calves.forEach(function(c){
      var ag=calcAge(c.dob)||c.age||'';
      var br=resolveCalfBreed(c).short||c.breed||'';
      var damInfo=c.damId?A.find(function(x){return x.id===c.damId;}):null;
      rows.push(row([
        c.tag||'',c.sex||'',br,c.sireBreed||'',
        damInfo?damInfo.tag||'':c.dam||'',
        c.damBreed||'',c.dob||'',ag,c.weight||'',c.bcs||'',c.color||'',c.status||''
      ]));
    });
    rows.push('');
    rows.push(row(['Summary','Value']));
    rows.push(row(['Total Calves',calves.length]));
    var hfrs=calves.filter(function(c){return c.sex==='heifer';}).length;
    var blCvs=calves.filter(function(c){return c.sex==='bull-calf';}).length;
    var strs=calves.filter(function(c){return c.sex==='steer';}).length;
    rows.push(row(['Heifers',hfrs+(calves.length?' ('+Math.round(hfrs/calves.length*100)+'%)':'')]));
    rows.push(row(['Bull Calves',blCvs+(calves.length?' ('+Math.round(blCvs/calves.length*100)+'%)':'')]));
    rows.push(row(['Steers',strs+(calves.length?' ('+Math.round(strs/calves.length*100)+'%)':'')]));
    var wts=calves.filter(function(c){return c.weight&&parseFloat(c.weight)>0;}).map(function(c){return parseFloat(c.weight);});
    if(wts.length){
      rows.push(row(['Avg Weight',Math.round(wts.reduce(function(s,w){return s+w;},0)/wts.length)+' lbs']));
      rows.push(row(['Weight Range',Math.min.apply(null,wts)+' – '+Math.max.apply(null,wts)+' lbs']));
    }
  }

  else if(key==='breeds'){
    filename='RanchBook_BreedBreakdown_'+dateStr+'.csv';
    rows.push(row(['Breed / Cross','Count','% of Herd','Animal Types']));
    var bm={};
    var bmTypes={};
    A.forEach(function(a){
      var b=a.type==='calf'?(resolveCalfBreed(a).short||a.breed||'Unknown'):(a.breed||'Unknown');
      bm[b]=(bm[b]||0)+1;
      if(!bmTypes[b])bmTypes[b]=[];
      if(bmTypes[b].indexOf(a.type)<0)bmTypes[b].push(a.type);
    });
    Object.keys(bm).sort(function(a,b){return bm[b]-bm[a];}).forEach(function(k){
      rows.push(row([k,bm[k],Math.round(bm[k]/A.length*100)+'%',bmTypes[k].join(', ')]));
    });
  }

  else if(key==='calving_year'){
    filename='RanchBook_CalvingByYear_'+dateStr+'.csv';
    rows.push(row(['Year','Calves Born']));
    var ym={};
    calves.forEach(function(c){if(c.dob){var y=c.dob.substr(0,4);ym[y]=(ym[y]||0)+1;}});
    cows.forEach(function(c){if(c.calves)c.calves.forEach(function(cv){if(cv.calvingDate){var y=cv.calvingDate.substr(0,4);ym[y]=(ym[y]||0)+1;}});});
    Object.keys(ym).sort().forEach(function(y){rows.push(row([y,ym[y]]));});
  }

  else if(key==='status'){
    filename='RanchBook_HerdStatus_'+dateStr+'.csv';
    rows.push(row(['Tag #','Type','Breed','Status','DOB','Age']));
    A.sort(function(a,b){return (a.status||'').localeCompare(b.status||'');}).forEach(function(a){
      var br=a.type==='calf'?(resolveCalfBreed(a).short||a.breed||''):(a.breed||'');
      rows.push(row([a.tag||'',a.type||'',br,a.status||'active',a.dob||'',calcAge(a.dob)||a.age||'']));
    });
  }

  else if(key==='weight'){
    filename='RanchBook_WeightSummary_'+dateStr+'.csv';
    rows.push(row(['Tag #','Type','Breed','Weight (lbs)','Body Condition Score','DOB','Age']));
    A.filter(function(a){return a.weight&&parseFloat(a.weight)>0;})
      .sort(function(a,b){return parseFloat(b.weight)-parseFloat(a.weight);})
      .forEach(function(a){
        var br=a.type==='calf'?(resolveCalfBreed(a).short||a.breed||''):(a.breed||'');
        rows.push(row([a.tag||'',a.type||'',br,a.weight||'',a.bcs||'',a.dob||'',calcAge(a.dob)||a.age||'']));
      });
    rows.push('');
    rows.push(row(['Group','Count','Avg Weight','Min Weight','Max Weight']));
    ['cow','bull','calf'].forEach(function(t){
      var grp=A.filter(function(a){return a.type===t&&a.weight&&parseFloat(a.weight)>0;}).map(function(a){return parseFloat(a.weight);});
      if(grp.length){
        var avg=Math.round(grp.reduce(function(s,w){return s+w;},0)/grp.length);
        rows.push(row([t+'s',grp.length,avg+' lbs',Math.min.apply(null,grp)+' lbs',Math.max.apply(null,grp)+' lbs']));
      }
    });
  }

  if(!rows.length){rows.push('No data available for this section.');}

  var blob=new Blob([rows.join('\n')],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var dlLink=document.createElement('a');
  dlLink.href=url;
  dlLink.download=filename;
  document.body.appendChild(dlLink);
  dlLink.click();
  document.body.removeChild(dlLink);
  URL.revokeObjectURL(url);
}

function exportSectionPdf(key){
  // Build a clean printable HTML page for this section and open print dialog
  var titles={
    overview:'Herd Overview',pregnancy:'Pregnancy Status',calvings:'Upcoming Calvings',
    buyer:'Calf Buyer Summary',calves_age:'Calves by Age',breeds:'Breed Breakdown',weight:'Weight Summary'
  };
  var title=titles[key]||key;
  var now=new Date();
  var dateStr=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  // Grab the card's inner HTML from the rendered report
  var cards=document.getElementById('reportBody').querySelectorAll('div[style*="background:#FDF6E8"]');
  var cardHtml='';
  cards.forEach(function(card){
    var h3=card.querySelector('h3');
    if(h3&&h3.textContent.toLowerCase().indexOf(title.toLowerCase().split(' ')[0])>=0){
      // Clone and strip export buttons
      var clone=card.cloneNode(true);
      clone.querySelectorAll('button').forEach(function(b){b.remove();});
      cardHtml=clone.innerHTML;
    }
  });

  // If specific card not found, use all report content
  if(!cardHtml){
    var allContent=document.getElementById('reportBody').cloneNode(true);
    allContent.querySelectorAll('button').forEach(function(b){b.remove();});
    cardHtml=allContent.innerHTML;
    title='Full Herd Report';
  }

  var win=window.open('','_blank');
  win.document.write(
    '<!DOCTYPE html><html><head><meta charset="UTF-8">'+
    '<title>Ranch Book — '+title+'</title>'+
    '<style>'+
      'body{font-family:Georgia,serif;color:#2C1A0E;margin:32px;background:white;font-size:13px;}'+
      'h1{font-size:1.4rem;color:#A0440A;margin-bottom:4px;}'+
      '.meta{font-size:0.75rem;color:#8C7A60;margin-bottom:24px;}'+
      'h3{font-size:0.65rem;letter-spacing:0.13em;text-transform:uppercase;color:#A0440A;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #C9A96E;}'+
      'svg{display:block;margin:8px auto;}'+
      '@media print{body{margin:16px;} button{display:none!important;}}'+
    '</style></head><body>'+
    '<h1>🐂 Ranch Book — '+title+'</h1>'+
    '<p class="meta">Generated '+dateStr+' &nbsp;·&nbsp; '+A.length+' animals on record</p>'+
    cardHtml+
    '<script>window.onload=function(){window.print();}<\/script>'+
    '</body></html>'
  );
  win.document.close();
}
